<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulu Team — End-to-End Transaction Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
      <rect width="400" height="300" fill="#F7F2EB"/>
      <rect x="120" y="90" width="160" height="120" fill="#B32025"/>
      <text x="200" y="160" text-anchor="middle" fill="#F7F2EB" font-family="Georgia, serif" font-size="44" font-weight="700" font-style="italic">Ulu</text>
      <text x="200" y="240" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, serif" font-size="13" letter-spacing="3">TRANSACTION PLATFORM</text>
    </svg>
  </template>

  <style>
    .btn svg { width: 16px !important; height: 16px !important; flex: none; }
    .btn-lg svg, .btn-xl svg { width: 18px !important; height: 18px !important; }
    .btn-sm svg { width: 13px !important; height: 13px !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/logos.jsx"></script>
  <script type="text/babel" src="components/sidebar.jsx"></script>
  <script type="text/babel" src="screens/01-login-dashboard.jsx"></script>
  <script type="text/babel" src="screens/02-transaction.jsx"></script>
  <script type="text/babel" src="screens/03-preapproval.jsx"></script>
  <script type="text/babel" src="screens/04-other-portal.jsx"></script>
  <script type="text/babel" src="screens/05-admin.jsx"></script>
  <script type="text/babel" src="screens/06-timeline-editor.jsx"></script>
  <script type="text/babel" src="screens/07-emails.jsx"></script>
  <script type="text/babel" src="screens/admin/00-admin-shell.jsx"></script>
  <script type="text/babel" src="screens/admin/01-dashboard.jsx"></script>
  <script type="text/babel" src="screens/admin/02-lender.jsx"></script>
  <script type="text/babel" src="screens/admin/03-timelines-clients.jsx"></script>

  <script type="text/babel">
    const SCREENS = [
      { id: 'login',         group: 'Client Portal',     label: 'Login' },
      { id: 'dashboard',     group: 'Client Portal',     label: 'Dashboard' },
      { id: 'preapproval',   group: 'Client Portal',     label: 'Pre-Approval' },
      { id: 'transaction',   group: 'Client Portal',     label: 'Transaction' },
      { id: 'documents',     group: 'Client Portal',     label: 'Documents' },
      { id: 'calendar',      group: 'Client Portal',     label: 'Calendar' },
      { id: 'settings',      group: 'Client Portal',     label: 'Settings' },
      { id: 'admin-login',   group: 'Admin (TM)',        label: 'Sign in — role picker' },
      { id: 'admin-dash',    group: 'Admin (TM)',        label: 'Dashboard' },
      { id: 'admin-tl',      group: 'Admin (TM)',        label: 'Timelines' },
      { id: 'admin-clients', group: 'Admin (TM)',        label: 'Clients' },
      { id: 'admin-add',     group: 'Admin (TM)',        label: 'Add Client (4-step)' },
      { id: 'admin-editor',  group: 'Admin (TM)',        label: 'Timeline Editor' },
      { id: 'admin-docs',    group: 'Admin (TM)',        label: 'Documents' },
      { id: 'kyle-dash',     group: 'Lender (GEM)',      label: 'Kyle — Dashboard' },
      { id: 'kyle-pipe',     group: 'Lender (GEM)',      label: 'Kyle — Pipeline' },
      { id: 'kyle-check',    group: 'Lender (GEM)',      label: 'Kyle — Doc Checklist' },
      { id: 'emails',        group: 'Emails',            label: 'Email Mockups' },
    ];

    function ScreenNav({ current, onPick }) {
      const [open, setOpen] = React.useState(false);
      const groups = {};
      SCREENS.forEach(s => {
        if (!groups[s.group]) groups[s.group] = [];
        groups[s.group].push(s);
      });
      const cur = SCREENS.find(s => s.id === current);
      return (
        <div style={{ position: 'fixed', bottom: 20, left: 20, zIndex: 200 }} data-screen-label="Navigator">
          <button onClick={() => setOpen(!open)} style={{
            background: 'var(--ulu-black)', color: '#fff',
            padding: '10px 14px', borderRadius: 100,
            display: 'flex', alignItems: 'center', gap: 10,
            fontSize: 12, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase',
            boxShadow: '0 10px 30px rgba(0,0,0,0.25)',
            border: '1px solid rgba(255,255,255,0.15)',
          }}>
            <span style={{ width: 8, height: 8, borderRadius: 100, background: 'var(--ulu-red)' }} />
            {cur ? `${cur.group} · ${cur.label}` : 'Screens'}
            <span style={{ fontSize: 10, opacity: 0.6 }}>{open ? '▼' : '▲'}</span>
          </button>
          {open && (
            <div style={{
              position: 'absolute', bottom: 48, left: 0,
              background: 'var(--ulu-black)', color: '#fff',
              borderRadius: 6, padding: 10, minWidth: 260,
              boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
              maxHeight: '70vh', overflowY: 'auto',
            }}>
              {Object.entries(groups).map(([g, items]) => (
                <div key={g} style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--ulu-red)', letterSpacing: '0.14em', textTransform: 'uppercase', padding: '8px 10px 4px' }}>{g}</div>
                  {items.map(it => (
                    <div key={it.id}
                         onClick={() => { onPick(it.id); setOpen(false); }}
                         style={{
                           padding: '8px 10px', fontSize: 13, borderRadius: 3,
                           cursor: 'pointer',
                           background: current === it.id ? 'rgba(179,32,37,0.25)' : 'transparent',
                           color: current === it.id ? '#fff' : 'rgba(255,255,255,0.75)',
                           fontWeight: current === it.id ? 600 : 400,
                         }}>
                      {it.label}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Tweak state
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "dashboardVariant": "actions",
      "transactionState": "ready"
    }/*EDITMODE-END*/;

    function TweakPanel({ tweaks, setTweaks, visible }) {
      if (!visible) return null;
      return (
        <div style={{ position: 'fixed', bottom: 80, right: 20, background: '#fff', border: '1px solid var(--n-200)', borderRadius: 10, padding: 18, width: 280, boxShadow: '0 20px 60px rgba(40,20,10,0.15)', zIndex: 200 }}>
          <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 600, fontSize: 16, marginBottom: 4 }}>Tweaks</div>
          <div style={{ fontSize: 12, color: 'var(--n-500)', marginBottom: 14 }}>Experiment with dashboard direction</div>
          <div className="eyebrow" style={{ marginBottom: 8 }}>Dashboard hero</div>
          {[
            ['actions', 'Action-first'],
            ['countdown', 'Closing countdown'],
            ['property', 'Property-focused'],
          ].map(([v, l]) => (
            <label key={v} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', cursor: 'pointer', fontSize: 13.5 }}>
              <input type="radio" checked={tweaks.dashboardVariant === v} onChange={() => setTweaks({ ...tweaks, dashboardVariant: v })} style={{ accentColor: 'var(--ulu-red)' }} />
              {l}
            </label>
          ))}

          <div className="eyebrow" style={{ marginTop: 18, marginBottom: 8 }}>Transaction state</div>
          {[
            ['pre-approval', 'Not in transaction (pre-approval)'],
            ['ready', 'Pre-approved, not under contract'],
            ['active', 'Active transaction (timeline)'],
          ].map(([v, l]) => (
            <label key={v} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', cursor: 'pointer', fontSize: 13.5 }}>
              <input type="radio" checked={tweaks.transactionState === v} onChange={() => setTweaks({ ...tweaks, transactionState: v })} style={{ accentColor: 'var(--ulu-red)' }} />
              {l}
            </label>
          ))}
        </div>
      );
    }

    function App() {
      const saved = localStorage.getItem('ulu_screen') || 'login';
      const [screen, setScreen] = React.useState(saved);
      const [tweaks, setTweaks] = React.useState(TWEAKS);
      const [tweakMode, setTweakMode] = React.useState(false);
      const [adminTab, setAdminTab] = React.useState('timelines');

      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweakMode(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweakMode(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const updateTweaks = (next) => {
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      };

      React.useEffect(() => {
        localStorage.setItem('ulu_screen', screen);
      }, [screen]);

      const portalScreens = ['dashboard', 'transaction', 'preapproval', 'documents', 'calendar', 'settings'];
      const inPortal = portalScreens.includes(screen);

      const portalContent = {
        dashboard:   <ScreenDashboard onNav={setScreen} variant={tweaks.dashboardVariant} />,
        transaction: <ScreenTransaction state={tweaks.transactionState} />,
        preapproval: <ScreenPreapproval />,
        documents:   <ScreenDocuments />,
        calendar:    <ScreenCalendar />,
        settings:    <ScreenSettings />,
      };

      return (
        <>
          {screen === 'login' && (
            <div data-screen-label="01 Login">
              <ScreenLogin onEnter={() => setScreen('dashboard')} />
            </div>
          )}

          {inPortal && (
            <div className="portal" data-screen-label={`Portal — ${screen}`}>
              <Sidebar active={screen} onNav={setScreen} />
              <main>{portalContent[screen]}</main>
            </div>
          )}

          {screen === 'admin-login' && (
            <div data-screen-label="Admin Login">
              <AdminLoginV2 onEnter={(role) => {
                if (role === 'kyle') setScreen('kyle-dash');
                else setScreen('admin-dash');
              }} />
            </div>
          )}

          {['admin-dash', 'admin-tl', 'admin-clients', 'admin-add', 'admin-docs'].includes(screen) && (() => {
            const tabMap = { 'admin-dash': 'dashboard', 'admin-tl': 'timelines', 'admin-clients': 'clients', 'admin-add': 'clients', 'admin-docs': 'documents' };
            const goTab = (t) => setScreen({ dashboard: 'admin-dash', timelines: 'admin-tl', clients: 'admin-clients', documents: 'admin-docs' }[t] || 'admin-dash');
            return (
              <div data-screen-label={`Admin — ${tabMap[screen]}`}>
                <AdminShellV2 roleKey="tm" tab={tabMap[screen]} onTab={goTab} onLogout={() => setScreen('admin-login')}>
                  {screen === 'admin-dash' && <AdminDashboard roleKey="tm" onNav={goTab} />}
                  {(screen === 'admin-tl') && <AdminTimelinesV2 roleKey="tm" onEdit={() => setScreen('admin-editor')} />}
                  {(screen === 'admin-clients' || screen === 'admin-add') && <AdminClientsV2 onAdd={() => setScreen('admin-add')} />}
                  {screen === 'admin-docs' && <AdminDocuments />}
                </AdminShellV2>
                {screen === 'admin-add' && <AddClientModalV2 onClose={() => setScreen('admin-clients')} />}
              </div>
            );
          })()}

          {['kyle-dash', 'kyle-pipe', 'kyle-check'].includes(screen) && (() => {
            const tabMap = { 'kyle-dash': 'dashboard', 'kyle-pipe': 'pipeline', 'kyle-check': 'checklists' };
            const goTab = (t) => setScreen({ dashboard: 'kyle-dash', pipeline: 'kyle-pipe', checklists: 'kyle-check', messages: 'kyle-dash', settings: 'kyle-dash' }[t] || 'kyle-dash');
            return (
              <div data-screen-label={`Kyle — ${tabMap[screen]}`}>
                <AdminShellV2 roleKey="kyle" tab={tabMap[screen]} onTab={goTab} onLogout={() => setScreen('admin-login')}>
                  {screen === 'kyle-dash' && <AdminDashboard roleKey="kyle" onNav={goTab} />}
                  {screen === 'kyle-pipe' && <LenderPipeline onOpenFile={() => setScreen('kyle-check')} />}
                  {screen === 'kyle-check' && <LenderChecklist onBack={() => setScreen('kyle-pipe')} />}
                </AdminShellV2>
              </div>
            );
          })()}

          {screen === 'admin-editor' && (
            <div data-screen-label="14 Timeline Editor">
              <TimelineEditor onBack={() => setScreen('admin-tl')} />
            </div>
          )}

          {screen === 'emails' && (
            <div data-screen-label="15-16 Emails" style={{ padding: 0 }}>
              <ScreenEmails />
            </div>
          )}

          <ScreenNav current={screen} onPick={setScreen} />
          <TweakPanel tweaks={tweaks} setTweaks={updateTweaks} visible={tweakMode} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
