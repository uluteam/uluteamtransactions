<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ulu Team — TM Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --red: #B32025;
  --red-ink: #8A181C;
  --red-wash: #FBECEC;
  --red-hover: #9C1C21;
  --black: #0B0B0B;
  --ink: #14110F;
  --ink-2: #2A2624;
  --ink-3: #55514E;
  --ink-4: #7A7672;
  --ink-5: #A8A4A0;
  --line: #E5E5E5;
  --line-2: #EFEDEB;
  --cream: #FBF8F3;
  --paper: #FFFFFF;
  --gem: #004FA3;
  --gem-ink: #003A7A;
  --gem-wash: #EAF1FA;
  --gem-line: #CFDEF0;
  --gold: #C79A2D;
  --gold-wash: #FBF3DB;
  --green: #1F8A4C;
  --green-wash: #E7F4EC;
  --amber: #C98416;
  --amber-wash: #FBEFD7;

  --serif: "Lora", "Times New Roman", serif;
  --sans: "Raleway", -apple-system, BlinkMacSystemFont, sans-serif;
  --gem-serif: Georgia, "Times New Roman", serif;

  --r-sm: 6px;
  --r: 10px;
  --r-lg: 14px;
  --shadow-sm: 0 1px 2px rgba(11,11,11,0.04);
  --shadow: 0 4px 14px rgba(11,11,11,0.06);
  --shadow-lg: 0 24px 48px -24px rgba(11,11,11,0.22);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #EDEBE7; color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body { min-height: 100vh; }
button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
a { color: inherit; }

/* ========== TYPE ========== */
.h-serif { font-family: var(--serif); font-weight: 700; letter-spacing: -0.01em; color: var(--ink); } /* opt-in display only */
.h1 { font-family: var(--sans); font-weight: 700; font-size: 36px; line-height: 1.15; letter-spacing: -0.02em; color: var(--ink); }
.h2 { font-family: var(--sans); font-weight: 700; font-size: 24px; line-height: 1.2; letter-spacing: -0.015em; color: var(--ink); }
.h3 { font-family: var(--sans); font-weight: 700; font-size: 18px; line-height: 1.25; letter-spacing: -0.01em; color: var(--ink); }
.eyebrow { font-family: var(--sans); font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-3); }
.micro { font-family: var(--sans); font-weight: 600; font-size: 10.5px; letter-spacing: 1.4px; text-transform: uppercase; }

/* ========== BUTTONS ========== */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 2px; font-weight: 700; font-size: 12.5px; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1; transition: all 0.15s ease; white-space: nowrap; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: var(--red-hover); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
.btn-ghost:hover { background: var(--ink); color: #fff; }
.btn-ghost-red { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
.btn-ghost-red:hover { background: var(--red); color: #fff; }
.btn-ghost-blue { background: transparent; color: var(--gem); border: 1.5px solid var(--gem); }
.btn-ghost-blue:hover { background: var(--gem); color: #fff; }
.btn-blue { background: var(--gem); color: #fff; font-family: var(--gem-serif); text-transform: none; letter-spacing: 0.2px; font-size: 15px; font-weight: 700; padding: 14px 24px; border-radius: 4px; }
.btn-blue:hover { background: var(--gem-ink); }
.btn-dark { background: var(--ink); color: #fff; }
.btn-dark:hover { background: #000; }
.btn-sm { padding: 8px 14px; font-size: 11px; letter-spacing: 1.2px; }
.btn-lg { padding: 16px 28px; font-size: 13px; }

/* ========== CARDS ========== */
.card { background: #fff; border: 1px solid var(--line); border-radius: var(--r); }
.card-accent { position: relative; overflow: hidden; }
.card-accent::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--red); }
.card-dark { background: var(--ink); color: #fff; border-radius: var(--r); }

/* ========== CHIPS ========== */
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 100px; font-size: 10.5px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; line-height: 1; }
.chip-green { background: var(--green-wash); color: var(--green); }
.chip-amber { background: var(--amber-wash); color: var(--amber); }
.chip-red { background: var(--red-wash); color: var(--red); }
.chip-ink { background: #F1EFEC; color: var(--ink-2); }
.chip-blue { background: var(--gem-wash); color: var(--gem); }
.chip-dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }

/* ========== INPUTS ========== */
.input { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--r-sm); font-size: 14px; background: #fff; transition: border-color 0.15s, box-shadow 0.15s; font-family: var(--sans); }
.input:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(179,32,37,0.12); }
.label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }

/* ========== APP SHELL ========== */
.app { min-height: 100vh; display: flex; background: #EDEBE7; }
.shell-content { flex: 1; min-width: 0; }

/* ========== RESPONSIVE HELPERS ========== */
/* Mobile / tablet breakpoint — collapses sidebar, stacks multi-col layouts, allows tables to scroll. */
@media (max-width: 860px) {
  /* Sidebar → horizontal top bar */
  .app { flex-direction: column; }
  .sidebar { width: 100% !important; min-height: auto !important; flex-direction: row !important; position: sticky !important; top: 0 !important; z-index: 50; align-items: center; padding: 0 12px; }
  .sidebar-head { padding: 10px 12px !important; border-bottom: none !important; border-right: 1px solid #1E1C1A; flex-shrink: 0; }
  .sidebar-head > div:last-child { display: none; }
  .sidebar-nav { display: flex !important; flex-direction: row; flex: 1; gap: 4px; padding: 8px !important; overflow-x: auto; }
  .sidebar-nav > div:first-child { display: none; }
  .sidebar-item { flex-shrink: 0; padding: 8px 12px !important; border-left: none !important; border-bottom: 3px solid transparent !important; margin-bottom: 0 !important; }
  .sidebar-item.active { border-left: none !important; border-bottom-color: var(--red) !important; padding-left: 12px !important; }
  .sidebar-foot { padding: 6px 12px !important; border-top: none !important; border-left: 1px solid #1E1C1A; flex-shrink: 0; }
  .sidebar-foot .sidebar-user > div:nth-child(2) { display: none; }

  /* Topbar and page padding */
  .topbar { padding: 14px 18px !important; }
  .page { padding: 22px 18px 60px !important; }

  /* Tables — let them scroll horizontally inside a wrapper */
  table { font-size: 12px; }

  /* Type scale */
  .h1 { font-size: 26px; }
  .h2 { font-size: 20px; }
  .h3 { font-size: 16px; }

  /* Generic stacking utility */
  .stack-sm { grid-template-columns: 1fr !important; flex-direction: column !important; align-items: stretch !important; }
  .stack-sm > * { width: 100%; }

  /* Stat cards: 1 col instead of 3 */
  .stats-row { grid-template-columns: 1fr !important; }

  /* Sticky bottom action bar — wrap */
  .sticky-bottom-bar { flex-wrap: wrap; gap: 8px; }
}

/* Horizontal-scroll wrapper for wide tables */
.scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.scroll-x table { min-width: 760px; }

/* Row flash when a date cascades from an upstream anchor change */
@keyframes cascadeFlash {
  0%   { background: rgba(199,154,45,0.30); box-shadow: inset 3px 0 0 var(--gold); }
  60%  { background: rgba(199,154,45,0.10); box-shadow: inset 3px 0 0 var(--gold); }
  100% { background: transparent; box-shadow: inset 3px 0 0 transparent; }
}
.cascade-flash > td { animation: cascadeFlash 2.4s ease-out; }

/* Pulsing dot used by dashboard cards / summary tiles */
@keyframes dashPulse {
  0%   { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
  70%  { box-shadow: 0 0 0 8px transparent; opacity: 0.6; }
  100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
}

/* ========== TIMELINE EDITOR — RESPONSIVE OVERRIDES ========== */
.tl-grid-2, .tl-grid-3, .tl-date-bar, .tl-agent-strip, .tl-party-row, .tl-party-row-name, .tl-party-headers, .tl-sticky-bar {}
@media (max-width: 860px) {
  .tl-date-bar { grid-template-columns: 1fr !important; gap: 12px !important; padding: 14px 18px !important; }
  .tl-agent-strip { grid-template-columns: 1fr !important; }
  .tl-grid-2, .tl-grid-3 { grid-template-columns: 1fr !important; gap: 12px !important; }
  /* Party rows: stack label above inputs */
  .tl-party-headers { display: none !important; }
  .tl-party-row, .tl-party-row-name { grid-template-columns: 1fr !important; gap: 6px !important; padding: 12px !important; }
  /* Hide the trailing × remove cell column placeholder on stacked layout; we'll show remove via a small floating button instead */
  .tl-party-row > :last-child, .tl-party-row-name > :last-child { justify-self: end; }
  .tl-sticky-bar { padding: 10px 14px !important; }
  .tl-sticky-bar .tl-sticky-actions { flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
  /* Dashboard rows: stack */
  .tl-dash-row { grid-template-columns: 1fr 1fr !important; gap: 12px !important; padding: 14px 16px !important; }
  .tl-dash-row > :first-child { grid-column: 1 / -1; }
  .tl-dash-row > :last-child { grid-column: 1 / -1; }
}

/* ========== SIDEBAR ========== */
.sidebar { width: 240px; background: #0B0B0B; color: #fff; min-height: 100vh; display: flex; flex-direction: column; position: sticky; top: 0; }
.sidebar-head { padding: 28px 22px 22px; border-bottom: 1px solid #1E1C1A; }
.sidebar-nav { flex: 1; padding: 14px 10px; }
.sidebar-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 6px; color: #C9C5C0; font-size: 13.5px; font-weight: 500; letter-spacing: 0.2px; cursor: pointer; border-left: 3px solid transparent; margin-bottom: 2px; transition: color 0.1s, background 0.1s; }
.sidebar-item:hover { color: #fff; background: #1A1816; }
.sidebar-item.active { color: #fff; background: #1A1816; border-left-color: var(--red); padding-left: 11px; }
.sidebar-item .icon { flex-shrink: 0; opacity: 0.8; }
.sidebar-item.active .icon { opacity: 1; }
.sidebar-foot { padding: 16px 22px 22px; border-top: 1px solid #1E1C1A; }
.sidebar-user { display: flex; align-items: center; gap: 10px; }
.sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#B32025,#6B1316); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }

/* ========== TOPBAR ========== */
.topbar { background: #fff; border-bottom: 1px solid var(--line); padding: 18px 36px; display: flex; align-items: center; justify-content: space-between; }
.topbar-title { display: flex; flex-direction: column; gap: 2px; }

/* ========== PAGE ========== */
.page { padding: 36px 44px 72px; max-width: 1280px; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 28px; }

/* ========== STATS ========== */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card { background: #fff; border: 1px solid var(--line); border-radius: var(--r); padding: 20px 22px; position: relative; overflow: hidden; }
.stat-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--red); }
.stat-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; }
.stat-value { font-family: var(--sans); font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
.stat-sub { margin-top: 10px; font-size: 12.5px; color: var(--ink-3); font-weight: 500; }

/* ========== TIMELINE (milestone) ========== */
.milestone-rail { display: flex; align-items: flex-start; justify-content: space-between; position: relative; padding: 40px 8px 24px; }
.milestone-rail::before { content: ""; position: absolute; top: 64px; left: 24px; right: 24px; height: 2px; background: var(--red); opacity: 0.25; }
.milestone { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; }
.milestone-dot { width: 22px; height: 22px; border-radius: 50%; background: var(--red); z-index: 1; border: 3px solid #fff; box-shadow: 0 0 0 1px var(--red); transition: transform 0.2s; }
.milestone-dot.done { background: var(--red); }
.milestone-dot.upcoming { background: #fff; border: 2px solid #D9D6D2; box-shadow: none; }
.milestone-dot.current { background: var(--red); box-shadow: 0 0 0 3px var(--red); }
.milestone-pulse { position: absolute; top: -5px; width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--red); animation: milestonePulse 1.6s ease-out infinite; opacity: 0; z-index: 0; }
@keyframes milestonePulse { 0% { transform: scale(0.7); opacity: 0.7; } 100% { transform: scale(1.4); opacity: 0; } }
.milestone-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.3px; color: var(--ink); text-align: center; line-height: 1.25; max-width: 110px; }
.milestone.current .milestone-label { color: var(--red); }
.milestone-date { font-size: 10.5px; color: var(--ink-4); font-weight: 500; letter-spacing: 0.4px; text-align: center; }
.milestone-check { position: absolute; top: -22px; font-size: 14px; color: var(--red); font-weight: 700; }

/* ========== TABLES ========== */
.doc-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--r); overflow: hidden; border: 1px solid var(--line); }
.doc-table th { text-align: left; font-size: 10.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-3); padding: 14px 18px; background: #FAFAF8; border-bottom: 1px solid var(--line); }
.doc-table td { padding: 16px 18px; font-size: 13.5px; color: var(--ink-2); border-bottom: 1px solid var(--line-2); }
.doc-table tr:last-child td { border-bottom: none; }
.doc-table tr:hover td { background: #FAFAF8; }

/* ========== STEPPER ========== */
.stepper { display: flex; gap: 4px; background: #fff; border: 1px solid var(--line); border-radius: var(--r); padding: 14px; }
.step { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 8px 6px; position: relative; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: #F1EFEC; color: var(--ink-4); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.step.done .step-num { background: var(--red); color: #fff; }
.step.current .step-num { background: var(--red); color: #fff; box-shadow: 0 0 0 3px var(--red-wash); }
.step-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-4); }
.step.done .step-label, .step.current .step-label { color: var(--ink); }
.step.current .step-label { color: var(--red); }
.step-bar { position: absolute; top: 21px; right: -4px; left: 34px; height: 2px; background: #F1EFEC; z-index: 0; }
.step.done .step-bar { background: var(--red); }
.step:last-child .step-bar { display: none; }

/* ========== GEM CARD ========== */
.gem-card { background: linear-gradient(180deg,#F6FAFE 0%, #FFFFFF 60%); border: 1.5px solid var(--gem-line); border-left: 5px solid var(--gem); border-radius: var(--r-lg); padding: 32px; position: relative; overflow: hidden; }
.gem-serif { font-family: var(--gem-serif); color: var(--gem-ink); }

/* ========== EMAIL FRAME ========== */
.email-frame { width: 640px; background: #fff; border-radius: var(--r); box-shadow: var(--shadow-lg); margin: 0 auto; overflow: hidden; }
.email-outer { background: #EDEBE7; padding: 56px 40px 72px; min-height: 100vh; }
.email-window { max-width: 760px; margin: 0 auto; background: #F5F3EF; border-radius: 14px; box-shadow: var(--shadow-lg); border: 1px solid var(--line); overflow: hidden; }
.email-chrome { background: #FAFAF6; padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
.email-chrome-dot { width: 11px; height: 11px; border-radius: 50%; background: #E0DCD7; }
.email-subject { margin-left: 16px; font-size: 12px; color: var(--ink-3); font-weight: 600; letter-spacing: 0.2px; }

/* ========== SCROLL ========== */
.has-scroll { overflow-y: auto; }

/* ========== UTIL ========== */
.row { display: flex; gap: 12px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 12px; }
.grow { flex: 1; }
.divider { height: 1px; background: var(--line); margin: 16px 0; }
.mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12.5px; letter-spacing: 0; }

/* ========== TC NOTE ========== */
.tc-note { background: var(--gold-wash); border: 1px solid #E8D079; border-left: 4px solid var(--gold); border-radius: 6px; padding: 12px 16px; margin: 12px 0; font-size: 13px; color: #6B4E10; line-height: 1.55; }

/* ========== SCROLLBAR ========== */
.sidebar::-webkit-scrollbar, .page-scroll::-webkit-scrollbar { width: 8px; }
.sidebar::-webkit-scrollbar-thumb { background: #2A2624; border-radius: 4px; }

/* ========== PRINT ========== */
.print-only { display: none; }

@media print {
  @page { size: Letter landscape; margin: 0.25in; }
  html, body { background: #fff !important; color: #000; font-size: 9px; }
  body * { visibility: hidden; }
  #timeline-print, #timeline-print * { visibility: visible; }
  #timeline-print { position: absolute; top: 0; left: 0; width: 100%; }
  .print-only { display: block; }
  .sidebar, .topbar, .tweaks, [data-screen-map] { display: none !important; }
  /* Force everything onto one page — no page-breaks between sections */
  .print-page { page-break-after: avoid !important; padding: 0 !important; }
  .print-section { page-break-inside: avoid; margin-bottom: 4px !important; }
  .print-head { padding-bottom: 6px; margin-bottom: 8px; }
  .print-head-title { font-size: 14px !important; }
  .print-head-date { font-size: 10px !important; }
  .print-property { margin-bottom: 8px !important; }
  .print-property-main { padding: 8px 10px !important; }
  .print-property-addr { font-size: 12px !important; }
  .print-property-dates > div { padding: 8px !important; }
  .print-dl { font-size: 10px !important; }
  .print-progress-block { margin-bottom: 8px !important; }
  .print-parties { margin-bottom: 8px !important; }
  .print-party { padding: 5px 8px !important; }
  .print-party-name { font-size: 10px !important; }
  .print-party-contact { font-size: 8px !important; }
  .print-section-head { font-size: 8px !important; padding: 4px 8px !important; }
  .print-table th { font-size: 7px !important; padding: 3px 5px !important; }
  .print-table td { font-size: 8px !important; padding: 3px 5px !important; }
  .print-foot { margin-top: 8px !important; padding-top: 6px !important; }
  .print-foot-name { font-size: 10px !important; }
  .print-foot-meta { font-size: 7.5px !important; }
  .print-foot-disclaimer { font-size: 7px !important; }
}

/* Print component styles — also visible onscreen if you remove .print-only display:none */
.print-page { padding: 0 0 18px; page-break-after: always; }
.print-page:last-of-type { page-break-after: auto; }

.print-head { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 14px; border-bottom: 2px solid var(--red); margin-bottom: 18px; }
.print-head-left { display: flex; align-items: center; gap: 16px; }
.print-head-divider { width: 1px; height: 36px; background: var(--line); }
.print-head-title { font-family: var(--sans); font-weight: 700; font-size: 22px; letter-spacing: -0.01em; color: var(--ink); margin-top: 2px; }
.print-head-date { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--ink); }
.print-head-right { text-align: right; }
.print-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--ink-3); }

.print-property { display: grid; grid-template-columns: 1.2fr 1fr; gap: 0; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
.print-property-main { padding: 16px 18px; border-right: 1px solid var(--line); }
.print-property-addr { font-family: var(--sans); font-weight: 700; font-size: 18px; letter-spacing: -0.01em; color: var(--ink); margin-top: 4px; }
.print-property-meta { font-size: 11px; color: var(--ink-3); margin-top: 4px; font-family: monospace; }
.print-property-dates { display: grid; grid-template-columns: 1fr 1fr 1.2fr; }
.print-property-dates > div { padding: 16px 14px; border-right: 1px solid var(--line); }
.print-property-dates > div:last-child { border-right: none; }
.print-closing-cell { background: var(--ink); color: #fff; }
.print-dl { font-family: var(--sans); font-weight: 700; font-size: 14px; color: var(--ink); margin-top: 4px; letter-spacing: -0.01em; }

.print-progress-block { margin-bottom: 18px; }
.print-progress-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.print-progress-stat { font-size: 11px; color: var(--ink-3); font-weight: 600; }
.print-progress-bar { height: 6px; background: #F1EFEC; border-radius: 3px; overflow: hidden; }
.print-progress-fill { height: 100%; background: var(--red); }

.print-milestones { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 14px; position: relative; }
.print-milestones::before { content: ""; position: absolute; top: 5px; left: 6%; right: 6%; height: 2px; background: #E5E5E5; }
.print-milestone { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; z-index: 1; }
.print-milestone-dot { width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 2px solid #D9D6D2; }
.print-milestone.done .print-milestone-dot { background: var(--red); border-color: var(--red); }
.print-milestone.current .print-milestone-dot { background: var(--red); border-color: var(--red); box-shadow: 0 0 0 2px var(--red-wash); }
.print-milestone-label { font-size: 9.5px; font-weight: 700; text-align: center; color: var(--ink); margin-top: 2px; line-height: 1.2; }
.print-milestone.current .print-milestone-label { color: var(--red); }
.print-milestone-date { font-size: 8.5px; color: var(--ink-4); font-weight: 500; }

.print-parties-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.print-party { padding: 10px 12px; border: 1px solid var(--line); border-radius: 4px; }
.print-party.highlight { border-color: var(--red); background: var(--red-wash); }
.print-party-role { font-size: 9px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--ink-3); }
.print-party.highlight .print-party-role { color: var(--red); }
.print-party-name { font-size: 13px; font-weight: 700; color: var(--ink); margin-top: 2px; }
.print-party-contact { font-size: 10.5px; color: var(--ink-3); }

.print-section { margin-bottom: 14px; page-break-inside: avoid; }
.print-section-head { font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: #fff; background: var(--ink); padding: 8px 12px; margin: 0; border-radius: 3px 3px 0 0; }
.print-table { width: 100%; border-collapse: collapse; border: 1px solid var(--line); border-top: none; }
.print-table th { text-align: left; font-size: 8.5px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-3); padding: 6px 10px; background: #FAFAF8; border-bottom: 1px solid var(--line); }
.print-table td { padding: 7px 10px; font-size: 10.5px; color: var(--ink-2); border-bottom: 1px solid var(--line-2); vertical-align: top; }
.print-table tr:last-child td { border-bottom: none; }
.print-table tr.critical td { background: rgba(179,32,37,0.025); }
.print-td-mono { font-family: monospace; font-weight: 700; color: var(--ink); }
.print-td-bold { font-weight: 600; color: var(--ink); white-space: nowrap; }
.print-td-note { color: var(--ink-3); font-style: italic; font-size: 10px; }
.print-status { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.6px; padding: 2px 6px; border-radius: 2px; }
.print-status.done { background: var(--green-wash); color: var(--green); }
.print-status.pending { background: #F1EFEC; color: var(--ink-3); }
.print-flag { display: inline-block; margin-left: 6px; font-size: 8.5px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; padding: 1px 5px; border-radius: 2px; background: var(--red-wash); color: var(--red); vertical-align: 1px; }
.print-flag.current { background: var(--red); color: #fff; }

.print-foot { margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--line); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; page-break-inside: avoid; }
.print-foot-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.print-foot-meta { font-size: 10px; color: var(--ink-3); }
.print-foot-right { text-align: right; }
.print-foot-disclaimer { grid-column: 1 / -1; font-size: 8.5px; color: var(--ink-4); line-height: 1.5; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line-2); }

/* ========== TWEAKS PANEL ========== */
.tweaks { position: fixed; bottom: 20px; right: 20px; width: 300px; background: #fff; border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--shadow-lg); z-index: 9999; padding: 16px 18px; display: none; font-size: 13px; }
.tweaks.open { display: block; }
.tweaks-title { font-family: var(--sans); font-weight: 700; font-size: 15px; letter-spacing: -0.01em; margin-bottom: 12px; }
.tweaks-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 0; border-top: 1px solid var(--line-2); }
.tweaks-row:first-of-type { border-top: none; }

</style>
</head>
