# Netlify config — static site, no build step.
[build]
  publish = "."

# SPA-style fallback: hash routing handles in-app navigation, but any direct
# URL hit should still land on index.html so refreshes never 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
